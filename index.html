<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>URL Shortener</title>
    <link rel="stylesheet" href="style.css?v=1.1" />
  </head>
  <body>
    <div class="container">
      <h2>URL Shortener</h2>

      <section>
        <h4><span>🔧</span> Custom Shorten</h4>
        <input type="text" id="url" placeholder="Enter long URL (https://...)" />
        <div style="display: flex; gap: 8px;">
          <input type="text" id="shortcode" placeholder="Custom code" />
          <input type="number" id="validity" placeholder="Mins" />
        </div>
        <button onclick="shorten()">Create Custom Link</button>
        <div id="result" class="output"></div>
      </section>

      <hr />

      <section>
        <h4><span>🎲</span> Random Shorten</h4>
        <input type="text" id="randomUrl" placeholder="Enter long URL" />
        <button onclick="shortenRandom()">Generate Link</button>
        <div id="randomResult" class="output"></div>
      </section>

      <hr />

      <section>
        <h4><span>📊</span> Link Analytics</h4>
        <input type="text" id="analyticsCode" placeholder="Enter shortcode" />
        <button onclick="getAnalytics()">Check Performance</button>
        <div id="analyticsResult" class="output"></div>
      </section>
    </div>

    <script src="script.js"></script>
  </body>
</html>
